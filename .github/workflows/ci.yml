name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: titanium_rental_car
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, json, fileinfo
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              break
            fi
            sleep 2
          done

      - name: Prepare database schema
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: titanium_rental_car
          DB_USERNAME: root
          DB_PASSWORD: root
        run: |
          mysql -h 127.0.0.1 -P 3306 -uroot -proot < database/schema.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -proot < database/seed.sql

      - name: Run pending migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: titanium_rental_car
          DB_USERNAME: root
          DB_PASSWORD: root
          APP_URL: http://localhost
        run: php bin/migrate.php

      - name: Run PHPUnit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: titanium_rental_car
          DB_USERNAME: root
          DB_PASSWORD: root
          APP_URL: http://localhost
        run: vendor/bin/phpunit

      - name: PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --memory-limit=512M --no-progress

      - name: Docker build
        run: docker compose build

      - name: Syntax check (app)
        run: find app public/index.php config -name '*.php' -print0 | xargs -0 -n1 php -l
